name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/bandhub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/bandhub" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Verify Doppler connection
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: |
          doppler secrets --config prd --project hbcubandhub --silent
          echo "Doppler connection verified"

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-worker:latest
            ${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    environment: production

    steps:
      - name: Create pre-deploy backup
        working-directory: /home/bandhub/bandhub
        run: |
          ./scripts/backup.sh || echo "Warning: backup failed, continuing"

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/bandhub" >> $GITHUB_ENV

      - name: Deploy to production
        working-directory: /home/bandhub/bandhub
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          # Pull latest compose file and scripts from main
          git fetch origin main
          git checkout origin/main -- docker-compose.prod.yml scripts/

          # Refresh secrets file from Doppler
          mkdir -p /secrets
          doppler secrets download --no-file --format env --project=hbcubandhub --config=prd > /secrets/.env
          chmod 600 /secrets/.env

          # Log in to GHCR and pull updated images
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker compose -f docker-compose.prod.yml pull api web worker

          # Ensure infrastructure is running
          docker compose -f docker-compose.prod.yml up -d postgres redis
          sleep 15

          # Run migrations
          docker compose -f docker-compose.prod.yml run --rm --no-deps \
            api npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma

          # Rolling restart app services
          for service in api web worker; do
            docker compose -f docker-compose.prod.yml up -d --no-deps $service
            sleep 10
          done

          # Prune old images
          docker image prune -f --filter "until=24h"

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 30
          for i in {1..10}; do
            if curl -fsk https://api.hbcubandhub.tech/api/v1/health; then
              echo "Health check passed"
              break
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
            if [ $i -eq 10 ]; then
              echo "Health check failed after 10 attempts"
              exit 1
            fi
          done

      - name: Smoke tests
        run: |
          curl -fsk https://api.hbcubandhub.tech/api/v1/health
          curl -fsk https://api.hbcubandhub.tech/api/v1/health/ready
          echo "Smoke tests passed"

      - name: Notify team on success
        if: success() && vars.SLACK_NOTIFICATIONS_ENABLED == 'true'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {"text": "Production deploy succeeded :white_check_mark: Commit: ${{ github.sha }} by ${{ github.actor }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify team on failure
        if: failure() && vars.SLACK_NOTIFICATIONS_ENABLED == 'true'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {"text": "Production deploy FAILED :x: Commit: ${{ github.sha }} by ${{ github.actor }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
