name: Deploy to Staging

on:
  push:
    branches:
      - develop
      - staging

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/bandhub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:staging
            ${{ env.IMAGE_PREFIX }}-api:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:staging
            ${{ env.IMAGE_PREFIX }}-web:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-worker:staging
            ${{ env.IMAGE_PREFIX }}-worker:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ~/bandhub

            # Pull latest compose file and scripts
            git fetch origin
            git checkout origin/${{ github.ref_name }} -- docker-compose.prod.yml scripts/

            # Log in to GHCR and pull updated images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull api web worker

            # Run migrations
            doppler run -- docker compose -f docker-compose.prod.yml run --rm \
              api npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma

            # Restart services
            docker compose -f docker-compose.prod.yml up -d

            # Prune old images
            docker image prune -f --filter "until=24h"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STG }}

      - name: Health check
        run: |
          sleep 30
          curl -f https://staging-api.hbcubandhub.tech/api/health || exit 1

      - name: Notify team on failure
        if: failure() && vars.SLACK_NOTIFICATIONS_ENABLED == 'true'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {"text": "Staging deploy FAILED :x: Branch: ${{ github.ref_name }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
