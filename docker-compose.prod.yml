# ========================================
# HBCU Band Hub - Production Docker Compose
# ========================================
# This file is optimized for production deployment.
# Run with: docker compose -f docker-compose.prod.yml up -d
# ========================================

services:
  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: hbcu-band-hub-db-prod
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-hbcu_band_hub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    secrets:
      - postgres_user
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/postgres_user) -d ${POSTGRES_DB:-hbcu_band_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hbcu-internal
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Redis Cache
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: hbcu-band-hub-redis-prod
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - hbcu-internal
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # NestJS API (Production)
  # ========================================
  api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-jfenderson}/bandhub-api:latest
    environment:
      NODE_ENV: production
      # Note: When using Doppler, these values are overridden by /secrets/.env
      # For non-Doppler deployments, these use env vars from .env file or Docker secrets
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hbcu_band_hub}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      API_PORT: 3001
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      YOUTUBE_API_KEY_FILE: /run/secrets/youtube_api_key
    volumes:
      - api_uploads:/app/apps/api/uploads
      - doppler_secrets:/secrets:ro
    env_file:
      - /secrets/.env
    secrets:
      - jwt_secret
      - youtube_api_key
      - postgres_user
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      doppler:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.hbcubandhub.tech`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3001"
    networks:
      - hbcu-internal
      - dokploy-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ========================================
  # Next.js Frontend (Production)
  # ========================================
  web:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-jfenderson}/bandhub-web:latest
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.hbcubandhub.tech}
    volumes:
      - doppler_secrets:/secrets:ro
    env_file:
      - /secrets/.env
    depends_on:
      api:
        condition: service_healthy
      doppler:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`hbcubandhub.tech`) || Host(`www.hbcubandhub.tech`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    networks:
      - hbcu-internal
      - dokploy-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ========================================
  # Background Worker (Production)
  # ========================================
  worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-jfenderson}/bandhub-worker:latest
    container_name: hbcu-band-hub-worker-prod
    environment:
      NODE_ENV: production
      # Note: When using Doppler, these values are overridden by /secrets/.env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hbcu_band_hub}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      YOUTUBE_API_KEY_FILE: /run/secrets/youtube_api_key
      MAX_YOUTUBE_CALLS_PER_MINUTE: ${MAX_YOUTUBE_CALLS_PER_MINUTE:-60}
    volumes:
      - doppler_secrets:/secrets:ro
    env_file:
      - /secrets/.env
    secrets:
      - youtube_api_key
      - postgres_user
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      doppler:
        condition: service_healthy
    networks:
      - hbcu-internal
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ========================================
  # Doppler Secrets Manager (Sidecar Pattern)
  # ========================================
  doppler:
    image: dopplerhq/cli:3
    container_name: hbcu-band-hub-doppler
    environment:
      DOPPLER_TOKEN: ${DOPPLER_TOKEN}
    command:
      - sh
      - -c
      - |
        doppler secrets download \
          --format=env \
          --config=${DOPPLER_CONFIG:-prd} \
          --project=hbcubandhub \
          /secrets/.env
        sleep infinity
    volumes:
      - doppler_secrets:/secrets
    networks:
      - hbcu-internal
    restart: always
    healthcheck:
      test: ["CMD", "test", "-f", "/secrets/.env"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

# ========================================
# Secrets (for Docker Swarm or external secrets management)
# ========================================
# Note: If using Doppler (see service above), these file-based secrets
# can be replaced. Doppler provides centralized secrets management with
# automatic rotation, access control, and audit logs.
# ========================================
secrets:
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  youtube_api_key:
    file: ./secrets/youtube_api_key.txt

# ========================================
# Named Volumes
# ========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_uploads:
    driver: local
  doppler_secrets:
    driver: local

# ========================================
# Networks
# ========================================
networks:
  hbcu-internal:
    driver: bridge
    internal: true
    name: hbcu-internal
  dokploy-network:
    external: true
