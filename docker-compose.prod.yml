# ========================================
# HBCU Band Hub - Production Docker Compose
# ========================================
# This file is optimized for production deployment.
# Run with: docker compose -f docker-compose.prod.yml up -d
# ========================================

services:
  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: hbcu-band-hub-db-prod
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-hbcu_band_hub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    secrets:
      - postgres_user
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/postgres_user) -d ${POSTGRES_DB:-hbcu_band_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hbcu-internal
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Redis Cache
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: hbcu-band-hub-redis-prod
    command:
      - sh
      - -c
      - |
        exec redis-server \
          --appendonly yes \
          --maxmemory 512mb \
          --maxmemory-policy allkeys-lru \
          ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - hbcu-internal
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # NestJS API (Production)
  # ========================================
  api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-jfenderson}/bandhub-api:latest
    environment:
      NODE_ENV: production
      # DATABASE_URL comes from /secrets/.env (Doppler) via env_file below
      # Override redis host to always use the internal service name
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - api_uploads:/app/apps/api/uploads
      - /secrets:/secrets:ro
    env_file:
      - /secrets/.env
    secrets:
      - youtube_api_key
      - postgres_user
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.hbcubandhub.tech`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3001"
    networks:
      - hbcu-internal
      - dokploy-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ========================================
  # Next.js Frontend (Production)
  # ========================================
  web:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-jfenderson}/bandhub-web:latest
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.hbcubandhub.tech}
      # Internal URL for server-side rendering — bypasses the internal:true network restriction
      API_URL: http://api:3001/api/v1
    volumes:
      - /secrets:/secrets:ro
    env_file:
      - /secrets/.env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`hbcubandhub.tech`) || Host(`www.hbcubandhub.tech`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    networks:
      - hbcu-internal
      - dokploy-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ========================================
  # Background Worker (Production)
  # ========================================
  worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-jfenderson}/bandhub-worker:latest
    container_name: hbcu-band-hub-worker-prod
    environment:
      NODE_ENV: production
      # DATABASE_URL comes from /secrets/.env (Doppler) via env_file below
      # Override redis host to always use the internal service name
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - /secrets:/secrets:ro
    env_file:
      - /secrets/.env
    secrets:
      - youtube_api_key
      - postgres_user
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - hbcu-internal
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ========================================
  # Prometheus
  # ========================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: hbcu-band-hub-prometheus
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
    networks:
      - hbcu-internal
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Grafana
  # ========================================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: hbcu-band-hub-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_SERVER_ROOT_URL: https://grafana.hbcubandhub.tech
      GF_SERVER_DOMAIN: grafana.hbcubandhub.tech
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.hbcubandhub.tech`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - hbcu-internal
      - dokploy-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ========================================
# Secrets (for Docker Swarm or external secrets management)
# ========================================
# Note: If using Doppler (see service above), these file-based secrets
# can be replaced. Doppler provides centralized secrets management with
# automatic rotation, access control, and audit logs.
# ========================================
secrets:
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  youtube_api_key:
    file: ./secrets/youtube_api_key.txt

# ========================================
# Named Volumes
# ========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_uploads:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ========================================
# Networks
# ========================================
networks:
  hbcu-internal:
    driver: bridge
    internal: true
    name: hbcu-internal
  dokploy-network:
    external: true
